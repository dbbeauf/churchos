<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChurchOS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sg-blue:#30A6F7;--sg-blue-dark:#5D7DEA;
  --text:#F0F0EE;--text2:#B0B0AC;--text3:#68686A;
  --border:rgba(255,255,255,0.12);
  --border2:rgba(255,255,255,0.18);
  --radius:10px;--radius-lg:14px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  /* Apple glass recipe */
  --glass-bg:rgba(28,28,36,0.72);
  --glass-bg-light:rgba(38,38,50,0.65);
  --glass-blur:saturate(180%) blur(40px);
  --glass-border:rgba(255,255,255,0.10);
  --glass-inset:inset 0 0.5px 0 rgba(255,255,255,0.45),inset 0 -0.5px 0 rgba(0,0,0,0.25),inset 0.5px 0 rgba(255,255,255,0.08),inset -0.5px 0 rgba(255,255,255,0.08);
  --glass-shadow:0 8px 32px rgba(0,0,0,0.36);
}

/* ── RICH BACKGROUND (essential for glass) ── */
body{
  font-family:var(--font);
  background:#080818;
  min-height:100vh;padding:0;margin:0;
  overflow:hidden;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 75% 60% at 10% 35%, rgba(48,166,247,0.22) 0%, transparent 65%),
    radial-gradient(ellipse 60% 55% at 88% 18%, rgba(93,125,234,0.20) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 70% 82%, rgba(48,166,247,0.14) 0%, transparent 60%),
    radial-gradient(ellipse 45% 45% at 35% 88%, rgba(93,125,234,0.12) 0%, transparent 55%),
    linear-gradient(160deg, #080c18 0%, #060a14 50%, #040810 100%);
  pointer-events:none;
  z-index:0;
}
.app{
  display:grid;
  grid-template-columns:clamp(200px,18vw,260px) 1fr;
  height:100vh;width:100%;
  overflow:hidden;
  background:transparent;
  position:relative;z-index:1;
}


/* ── APPLE GLASS SURFACES ── */
.main-header{position:relative}
.panel-header{position:relative}
.sidebar-header{position:relative}
/* Top specular highlight on glass panels */
.main-header::after,.panel-header::after,.sidebar-header::after{
  content:'';position:absolute;top:0;left:0;right:0;height:0.5px;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.55) 25%,rgba(255,255,255,0.60) 50%,rgba(255,255,255,0.55) 75%,transparent 100%);
  pointer-events:none;
}

/* ── SIDEBAR ── */
.sidebar{border-right:0.5px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;background:rgba(8,12,24,0.55);backdrop-filter:saturate(200%) blur(50px);-webkit-backdrop-filter:saturate(200%) blur(50px);border-right:0.5px solid rgba(255,255,255,0.22);}
.sidebar-header{padding:20px 16px 15px;border-bottom:0.5px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.03);}
.logo{font-size:15px;font-weight:500;color:var(--text);letter-spacing:-.3px}
.logo span{color:var(--sg-blue)}
.org-name{font-size:11px;color:var(--text3);margin-top:3px}
.ws-section{padding:14px 10px 8px;flex:1;overflow-y:auto;scrollbar-width:none}
.ws-section::-webkit-scrollbar{display:none}
.ws-label-header{font-size:10px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:0 6px;margin-bottom:6px}
.ws-item{display:flex;align-items:center;gap:9px;padding:8px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);margin-bottom:2px;transition:background .1s;user-select:none}
.ws-item:hover{background:rgba(255,255,255,0.07);}
.ws-item.active{font-weight:500}
.ws-icon{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── WORKSPACE AREA ── */
.workspace-area{display:grid;grid-template-columns:1fr clamp(260px,22vw,380px);overflow:hidden}
.ws-screen{display:none;contents}
.ws-screen.active{display:contents}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;background:rgba(14,14,22,0.60);backdrop-filter:saturate(180%) blur(40px);-webkit-backdrop-filter:saturate(180%) blur(40px);min-width:0;overflow:hidden;}
.main-header{padding:18px 28px 16px;border-bottom:0.5px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:rgba(255,255,255,0.02);}
.header-left{display:flex;align-items:center;gap:11px}
.header-icon{width:30px;height:30px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.main-title{font-size:15px;font-weight:500;color:var(--text)}
.main-sub{font-size:12px;color:var(--text3);margin-top:2px}
.header-badge{font-size:11px;padding:4px 11px;border-radius:20px;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px}
.badge-dot{width:6px;height:6px;border-radius:50%}

/* ── CONVERSATION ── */
.conversation{flex:1;padding:28px 32px;overflow-y:auto;display:flex;flex-direction:column;gap:20px;scrollbar-width:thin;scrollbar-color:rgba(107,159,232,0.20) transparent}
.conversation::-webkit-scrollbar{width:4px}
.conversation::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.welcome-card{border-radius:var(--radius-lg);padding:18px 20px;border:0.5px solid}
.welcome-title{font-size:14px;font-weight:500;margin-bottom:4px}
.welcome-body{font-size:13px;line-height:1.5;opacity:.9}

.msg-ai{display:flex;gap:12px;align-items:flex-start}
.ai-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ai-bubble{background:rgba(255,255,255,0.11);backdrop-filter:saturate(180%) blur(40px);-webkit-backdrop-filter:saturate(180%) blur(40px);border-radius:0 var(--radius-lg) var(--radius-lg) var(--radius-lg);padding:13px 17px;font-size:13.5px;color:var(--text);line-height:1.65;border:0.5px solid rgba(255,255,255,0.30);box-shadow:var(--glass-shadow),inset 0 0.5px 0 rgba(255,255,255,0.65),inset 0 -0.5px 0 rgba(0,0,0,0.20),inset 0.5px 0 rgba(255,255,255,0.14),inset -0.5px 0 rgba(255,255,255,0.06);max-width:85%;}
.ai-bubble strong{font-weight:600}

.msg-user{display:flex;justify-content:flex-end}
.user-bubble{background:rgba(60,90,160,0.55);backdrop-filter:saturate(180%) blur(40px);-webkit-backdrop-filter:saturate(180%) blur(40px);border-radius:var(--radius-lg) var(--radius-lg) 0 var(--radius-lg);padding:13px 17px;font-size:13.5px;color:#D8E8FF;line-height:1.65;max-width:72%;border:0.5px solid rgba(107,159,232,0.55);box-shadow:var(--glass-shadow),inset 0 0.5px 0 rgba(180,210,255,0.70),inset 0 -0.5px 0 rgba(0,0,0,0.25),inset 0.5px 0 rgba(107,159,232,0.20),inset -0.5px 0 rgba(107,159,232,0.08);}

.loading-card{background:rgba(255,255,255,0.09);backdrop-filter:saturate(180%) blur(40px);-webkit-backdrop-filter:saturate(180%) blur(40px);border:0.5px solid rgba(255,255,255,0.26);border-radius:var(--radius-lg);padding:16px 18px;margin-left:40px;box-shadow:var(--glass-shadow),var(--glass-inset);}
.loading-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.loading-step{display:flex;align-items:center;gap:11px;padding:5px 0}
.step-icon{width:17px;height:17px;border-radius:50%;background:#1A2E1A;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-label{font-size:12.5px;color:#4CAF7A;line-height:1.4}
.step-pending{display:flex;align-items:center;gap:11px;padding:5px 0}
.step-spinner{width:17px;height:17px;border-radius:50%;border:2px solid #1E3E1E;border-top-color:#4CAF7A;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.typing-wrap{display:flex;gap:12px;align-items:flex-start}
.typing-dots{background:rgba(255,255,255,0.10);backdrop-filter:saturate(180%) blur(40px);-webkit-backdrop-filter:saturate(180%) blur(40px);border:0.5px solid rgba(255,255,255,0.28);border-radius:0 var(--radius-lg) var(--radius-lg) var(--radius-lg);padding:13px 17px;display:flex;gap:4px;align-items:center;box-shadow:var(--glass-shadow),var(--glass-inset);}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:blink 1.4s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

.chips-section{padding:0 32px 16px;flex-shrink:0}
.chips-hint{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:7px 13px;border-radius:20px;border:0.5px solid rgba(255,255,255,0.22);font-size:12px;color:var(--text2);cursor:pointer;background:rgba(255,255,255,0.09);backdrop-filter:saturate(180%) blur(30px);-webkit-backdrop-filter:saturate(180%) blur(30px);transition:all .15s;white-space:nowrap;font-family:var(--font);box-shadow:var(--glass-inset);}
.chip:hover{border-color:rgba(107,159,232,0.60);color:var(--text);background:rgba(255,255,255,0.14);}

.input-area{padding:16px 32px 22px;border-top:0.5px solid rgba(255,255,255,0.18);flex-shrink:0;background:rgba(255,255,255,0.02);}
.input-hint{font-size:11px;color:var(--text3);margin-bottom:8px;padding-left:4px}
.input-wrap{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.08);backdrop-filter:saturate(180%) blur(40px);-webkit-backdrop-filter:saturate(180%) blur(40px);border-radius:26px;border:0.5px solid rgba(255,255,255,0.28);padding:11px 18px;box-shadow:var(--glass-inset);}
.input-wrap input{flex:1;border:none;background:transparent;font-size:13.5px;color:var(--text);outline:none;font-family:var(--font)}
.input-wrap input::placeholder{color:var(--text3)}
.input-wrap input:disabled{opacity:.4}
.send-btn{width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:filter .1s}
.send-btn:hover:not(:disabled){filter:brightness(1.2)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── RIGHT PANEL ── */
.right-panel{border-left:0.5px solid var(--border);display:flex;flex-direction:column;background:rgba(16,16,26,0.72);backdrop-filter:saturate(180%) blur(40px);-webkit-backdrop-filter:saturate(180%) blur(40px);border-left:0.5px solid rgba(255,255,255,0.22);}
.panel-header{padding:18px 18px 15px;border-bottom:0.5px solid rgba(255,255,255,0.18);flex-shrink:0;background:rgba(255,255,255,0.03);}
.state-indicator{display:flex;align-items:center;gap:6px;font-size:10px;color:#4CAF7A;background:rgba(76,175,122,0.16);border:0.5px solid rgba(76,175,122,0.35);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);padding:4px 10px;border-radius:20px;width:fit-content;margin-bottom:8px}
.panel-title{font-size:13px;font-weight:500;color:var(--text)}
.panel-sub{font-size:11px;color:var(--text3);margin-top:3px}
.panel-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

.prop-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:rgba(255,255,255,0.08);backdrop-filter:saturate(180%) blur(30px);-webkit-backdrop-filter:saturate(180%) blur(30px);border-radius:var(--radius);padding:10px 12px;border:0.5px solid rgba(255,255,255,0.22);box-shadow:var(--glass-shadow),var(--glass-inset);}
.stat-val{font-size:19px;font-weight:500;color:var(--text)}
.stat-name{font-size:10px;color:var(--text3);margin-top:2px}
.stat-delta{font-size:10px;margin-top:3px}
.up{color:#4CAF7A}.flag{color:#C89030}.dn{color:#C05050}

.card{border:0.5px solid rgba(255,255,255,0.22);border-radius:var(--radius);padding:10px 13px;margin-bottom:6px;background:rgba(255,255,255,0.07);backdrop-filter:saturate(180%) blur(30px);-webkit-backdrop-filter:saturate(180%) blur(30px);box-shadow:var(--glass-shadow),var(--glass-inset);}
.card-title{font-size:13px;font-weight:500;color:var(--text)}
.card-sub{font-size:11px;color:var(--text3);margin-top:2px}

.task-list{display:flex;flex-direction:column;gap:6px}
.task-item{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;background:rgba(255,255,255,0.06);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-radius:var(--radius);border:0.5px solid rgba(255,255,255,0.16);}
.task-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.task-text{font-size:12px;color:var(--text2);line-height:1.5}

.bar-chart{display:flex;align-items:flex-end;gap:5px;height:64px}
.bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{border-radius:3px 3px 0 0;width:100%;transition:height .4s}
.bar-lbl{font-size:9px;color:var(--text3)}

.panel-actions{padding:14px 18px 18px;border-top:0.5px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0;background:rgba(255,255,255,0.03);border-top:0.5px solid rgba(255,255,255,0.18);}
.act-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.btn-primary{width:100%;padding:11px;border-radius:var(--radius);border:none;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:filter .1s}
.btn-primary:hover{filter:brightness(1.15)}
.btn-row{display:flex;gap:8px}
.btn-sec{flex:1;padding:9px 6px;border-radius:var(--radius);background:rgba(255,255,255,0.08);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border:0.5px solid rgba(255,255,255,0.22);color:var(--text2);font-size:11.5px;cursor:pointer;font-family:var(--font);text-align:center;transition:all .15s;box-shadow:var(--glass-inset);}
.btn-sec:hover{background:rgba(255,255,255,0.16);border-color:rgba(255,255,255,0.40);color:var(--text);}

.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--border) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Church<span>OS</span></div>
      <div class="org-name" id="org-name">Crosspoint Church</div>
    </div>
    <div class="ws-section">
      <div class="ws-label-header">Workspaces</div>
      <div class="ws-item" data-ws="home"       onclick="show('home')">       <div class="ws-icon" style="background:rgba(107,159,232,0.15)"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="4" height="4" rx="1" fill="#6B9FE8"/><rect x="7" y="1" width="4" height="4" rx="1" fill="#6B9FE8"/><rect x="1" y="7" width="4" height="4" rx="1" fill="#6B9FE8"/><rect x="7" y="7" width="4" height="4" rx="1" fill="#6B9FE8"/></svg></div>Command center</div>
      <div class="ws-item" data-ws="leadership" onclick="show('leadership')"> <div class="ws-icon" style="background:rgba(61,184,138,0.15)"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="4" r="2.5" stroke="#3DB88A" stroke-width="1.2"/><path d="M2 10c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="#3DB88A" stroke-width="1.2" stroke-linecap="round"/></svg></div>Leadership</div>
      <div class="ws-item" data-ws="events"     onclick="show('events')">     <div class="ws-icon" style="background:rgba(107,159,232,0.15)"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="1" y="2" width="10" height="8" rx="1.5" stroke="#6B9FE8" stroke-width="1.2"/><path d="M4 2V1M8 2V1M1 5h10" stroke="#6B9FE8" stroke-width="1.2" stroke-linecap="round"/></svg></div>Events</div>
      <div class="ws-item" data-ws="volunteers" onclick="show('volunteers')"> <div class="ws-icon" style="background:rgba(200,144,48,0.15)"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="4" cy="4" r="1.8" stroke="#C89030" stroke-width="1.2"/><circle cx="8" cy="4" r="1.8" stroke="#C89030" stroke-width="1.2"/><path d="M1 10c0-1.7 1.3-3 3-3M8 7c1.7 0 3 1.3 3 3" stroke="#C89030" stroke-width="1.2" stroke-linecap="round"/></svg></div>Volunteers</div>
      <div class="ws-item" data-ws="finance"    onclick="show('finance')">    <div class="ws-icon" style="background:rgba(76,175,122,0.15)"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="2" y="3" width="8" height="6" rx="1" stroke="#4CAF7A" stroke-width="1.2"/><path d="M4 7h4M4 5.5h2" stroke="#4CAF7A" stroke-width="1.2" stroke-linecap="round"/></svg></div>Finance</div>
      <div class="ws-item" data-ws="guests"     onclick="show('guests')">     <div class="ws-icon" style="background:rgba(208,112,144,0.15)"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 2C4.3 2 3 3.1 3 4.5c0 .8.4 1.5 1 2L6 10l2-3.5c.6-.5 1-1.2 1-2C9 3.1 7.7 2 6 2z" stroke="#D07090" stroke-width="1.2"/></svg></div>Guests</div>
      <div class="ws-item" data-ws="comms"      onclick="show('comms')">      <div class="ws-icon" style="background:rgba(208,128,80,0.15)"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 8.5C2 6.6 3.6 5 5.5 5h1C8.4 5 10 6.6 10 8.5" stroke="#D08050" stroke-width="1.2" stroke-linecap="round"/><circle cx="6" cy="3" r="1.8" stroke="#D08050" stroke-width="1.2"/></svg></div>Communications</div>
      <div class="ws-item" data-ws="youth"      onclick="show('youth')">      <div class="ws-icon" style="background:rgba(144,136,224,0.15)"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 2L7.5 5h3l-2.5 2 1 3L6 8.5 3 10l1-3L1.5 5h3z" stroke="#9088E0" stroke-width="1.2" stroke-linejoin="round"/></svg></div>Youth</div>
      <div class="ws-item" data-ws="facilities" onclick="show('facilities')"> <div class="ws-icon" style="background:rgba(160,160,156,0.15)"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="1.5" y="4" width="9" height="6.5" rx="1" stroke="#888884" stroke-width="1.2"/><path d="M4 4V3a2 2 0 014 0v1" stroke="#888884" stroke-width="1.2"/></svg></div>Facilities</div>
    </div>
  </div>

  <!-- WORKSPACE AREA -->
  <div class="workspace-area" id="workspace-area"></div>

</div>

<script>
// ── WORKSPACE DEFINITIONS (dark palette) ────────────────────────────────────
const WS = {
  home:{
    title:'Good morning, Pastor Dave', sub:'Here\'s what needs your attention today.',
    iconBg:'#1A2740', btnColor:'#4E82D9',
    badge:'3 items need attention', badgeBg:'#1A2740', badgeText:'#6B9FE8', badgeBorder:'#2A3F5E',
    accentBg:'#1A2740', accentText:'#6B9FE8', accentBorder:'#2A3F5E',
    welcomeTitle:'ChurchOS is ready',
    welcomeBody:'Ask me anything about your church — events, volunteers, giving, guests, or operations. I have full context across all your workspaces.',
    inputHint:'Ask anything or click a workspace to get started',
    inputPlaceholder:'Ask anything about your church...',
    suggestions:[
      {text:'Plan Easter services',       border:'#2A3F5E', color:'#6B9FE8'},
      {text:'Build volunteer schedule',   border:'#3A2A10', color:'#C89030'},
      {text:'Board giving summary',       border:'#1E3020', color:'#4CAF7A'},
      {text:'Guest follow-ups',           border:'#3A1828', color:'#D07090'},
      {text:'Draft announcement',         border:'#3A2010', color:'#D08050'},
      {text:'Weekly leadership briefing', border:'#183028', color:'#3DB88A'},
    ],
    loadingSteps:['Reviewing activity across all 9 workspaces','Checking giving, attendance, and volunteer data','Identifying top priorities for today'],
    defaultPanel:`
      <div><div class="prop-label">This week</div>
        <div class="stat-grid">

function buildWorkspaces() {
  const area = document.getElementById('workspace-area');
  area.innerHTML = Object.entries(WS).map(([id, ws]) => `
    <div class="ws-screen" id="ws-${id}">
      <div class="main">
        <div class="main-header">
          <div class="header-left">
            <div class="header-icon" style="background:${ws.iconBg}">
              <svg width="15" height="15" viewBox="0 0 12 12" fill="none">${getIconPath(id)}</svg>
            </div>
            <div>
              <div class="main-title">${ws.title}</div>
              <div class="main-sub">${ws.sub}</div>
            </div>
          </div>
          ${ws.badge ? `<div class="header-badge" style="background:${ws.badgeBg};color:${ws.badgeText};border:0.5px solid ${ws.badgeBorder}"><div class="badge-dot" style="background:${ws.btnColor}"></div>${ws.badge}</div>` : ''}
        </div>
        <div class="conversation" id="conv-${id}">
          <div class="welcome-card" style="background:${ws.accentBg};border-color:${ws.accentBorder}">
            <div class="welcome-title" style="color:${ws.accentText}">${ws.welcomeTitle}</div>
            <div class="welcome-body" style="color:${ws.accentText};opacity:.9">${ws.welcomeBody}</div>
          </div>
        </div>
        <div class="chips-section" id="chips-${id}">
          <div class="chips-hint">Suggested for today</div>
          <div class="chip-row">
            ${ws.suggestions.map(s => `<div class="chip" style="border-color:${s.border};color:${s.color}" onclick="sendMsg('${id}',${JSON.stringify(s.text)})">${s.text}</div>`).join('')}
          </div>
        </div>
        <div class="input-area">
          <div class="input-hint">${ws.inputHint}</div>
          <div class="input-wrap">
            <input type="text" id="input-${id}" placeholder="${ws.inputPlaceholder}"
              onkeydown="if(event.key==='Enter')sendMsg('${id}')"/>
            <button class="send-btn" id="send-${id}" style="background:${ws.btnColor}"
              onclick="sendMsg('${id}')">
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M12 7L2 2l2.5 5L2 12l10-5z" fill="white"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="right-panel">
        <div class="panel-header" id="panel-header-${id}">
          <div class="panel-title">${ws.panelTitle}</div>
          <div class="panel-sub">${ws.panelSub}</div>
        </div>
        <div class="panel-body" id="panel-body-${id}">${ws.defaultPanel}</div>
        <div class="panel-actions" id="panel-actions-${id}">
          <div class="act-label">Quick actions</div>
          <div class="btn-row">${ws.actions.slice(0,2).map(a=>`<button class="btn-sec" onclick="sendMsg('${id}',${JSON.stringify(a)})">${a}</button>`).join('')}</div>
          ${ws.actions.length>2?`<div class="btn-row">${ws.actions.slice(2,4).map(a=>`<button class="btn-sec" onclick="sendMsg('${id}',${JSON.stringify(a)})">${a}</button>`).join('')}</div>`:''}
        </div>
      </div>
    </div>`).join('');
}

// ── SHOW WORKSPACE ─────────────────────────────────────────────────────────
function show(ws) {
  document.querySelectorAll('.ws-screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.ws-item').forEach(i => {
    i.classList.remove('active');
    i.style.background = '';
    i.style.color = '';
  });
  const screen = document.getElementById('ws-' + ws);
  if (screen) screen.classList.add('active');
  const item = document.querySelector(`[data-ws="${ws}"]`);
  if (item) {
    item.classList.add('active');
    const a = accentMap[ws] || accentMap.home;
    item.style.background = a.bg;
    item.style.color = a.text;
  }
  state.active = ws;
  loadWorkspaceData(ws);
}

async function loadFinanceData() {
  try {
    const today = new Date();
    const start = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
    const end = today.toISOString().split('T')[0];
    const res = await fetch(`/api/securegive/summary?dateMin=${start}&dateMax=${end}`);
    if (!res.ok) throw new Error();
    const d = await res.json();
    state.financeData = d;
    const fmt = n => '$' + (n >= 1000 ? (n/1000).toFixed(0)+'k' : n.toLocaleString());
    setText('fin-total',  fmt(d.totalGiving ?? 0));
    setText('fin-yoy',    (d.yoyChange ?? 0) >= 0 ? `+${(d.yoyChange||0).toFixed(1)}% YoY` : `${(d.yoyChange||0).toFixed(1)}% YoY`);
    setText('fin-recur',  fmt(d.recurringMRR ?? 0));
    setText('fin-recur-pct', `${(d.recurringPct||65).toFixed(0)}% of total`);
    setText('fin-new',    d.newDonors ?? '—');
    setText('fin-new-delta', d.newDonorChange > 0 ? `+${d.newDonorChange} vs last mo` : '');
    setText('fin-lapsed', d.lapsedCount ?? '—');
    setText('fin-lapsed-label', d.lapsedCount > 0 ? 'Need follow-up' : 'None this month');
    const bars = d.monthlyTrend ?? mockTrend();
    const max = Math.max(...bars.map(b => b.amount || b.pct || 1));
    const barsEl = document.getElementById('fin-bars');
    if (barsEl) barsEl.innerHTML = bars.map((b, i) => {
      const pct = ((b.amount || b.pct || 0) / max) * 100;
      const h = Math.max(4, pct * 0.64);
      const isCurrent = i === bars.length - 1;
      const col = isCurrent ? '#4CAF7A' : pct > 80 ? '#306840' : pct > 60 ? '#2A5030' : '#1E3820';
      return `<div class="bar-wrap"><div class="bar" style="height:${h}px;background:${col}"></div><div class="bar-lbl">${b.label}</div></div>`;
    }).join('');
    const insEl = document.getElementById('fin-insights');
    if (insEl) {
      const ins = d.insights ?? [{text:'Online giving is your fastest growing channel',dot:'#4CAF7A'},{text:`${d.lapsedCount||0} recurring donors need follow-up`,dot:'#C89030'}];
      insEl.innerHTML = ins.slice(0,3).map(i => `<div class="task-item"><div class="task-dot" style="background:${i.dot}"></div><div class="task-text">${i.text}</div></div>`).join('');
    }
  } catch(e) { populateFinanceMock(); }
}

// ── SEND MESSAGE & AI CHAT ─────────────────────────────────────────────────
async function sendMsg(wsId, overrideText) {
  if (state.streaming) return;
  const input = document.getElementById('input-' + wsId);
  const text = (overrideText || input.value || '').trim();
  if (!text) return;
  input.value = '';
  const chips = document.getElementById('chips-' + wsId);
  if (chips) chips.style.display = 'none';
  addMsg(wsId, 'user', text);
  state.streaming = true;
  input.disabled = true;
  document.getElementById('send-' + wsId).disabled = true;
  const loadingId = 'load-' + Date.now();
  const ws = WS[wsId];
  const smartSteps = getSmartSteps(wsId, text);
  addLoadingCard(wsId, loadingId, smartSteps.steps, smartSteps.title);
  try {
    const ctx = { workspace:wsId, financeData:state.financeData, rockDashboard:state.rockDashboard };
    await animateLoadingSteps(loadingId, smartSteps.steps);
    const response = await callAI(wsId, text, ctx);
    removeLoading(wsId, loadingId);
    addMsg(wsId, 'ai', response.text, true, ws);
    if (response.panel) updatePanel(wsId, response.panel, ws);
  } catch(err) {
    removeLoading(wsId, loadingId);
    addMsg(wsId, 'ai', 'I had trouble connecting to the AI. Please check your API key and try again.', false, ws);
  }
  state.streaming = false;
  input.disabled = false;
  document.getElementById('send-' + wsId).disabled = false;
  input.focus();
}

function addMsg(wsId, role, text, tinted, ws) {
  const conv = document.getElementById('conv-' + wsId);
  const div = document.createElement('div');
  if (role === 'user') {
    div.className = 'msg-user';
    div.innerHTML = `<div class="user-bubble">${escHtml(text)}</div>`;
  } else {
    div.className = 'msg-ai';
    const style = tinted && ws ? `background:${ws.accentBg};border-color:${ws.accentBorder};color:${ws.accentText}` : '';
    const fmt = text.replace(/\*\*(.*?)\*\*/g, `<strong style="color:${ws ? ws.accentText : '#E8E8E6'}">$1</strong>`);
    div.innerHTML = `
      <div class="ai-avatar" style="background:${ws ? ws.btnColor : '#4E82D9'}">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 1l1.2 3.2L10 5.5l-2.8 1.3L6 10l-1.2-3.2L2 5.5l2.8-1.3z" fill="white"/></svg>
      </div>
      <div class="ai-bubble${tinted?' tinted':''}" style="${style}">${fmt}</div>`;
  }
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
}

function getSmartSteps(wsId, text) {
  const t = text.toLowerCase();

  // Simple conversational — no data lookup needed
  const isSimple = t.length < 30 && !t.match(/show|get|pull|fetch|report|summary|plan|schedule|list|how many|what is|tell me|give me|analyze|compare|trend|forecast|lapsed|gap|guest|donor|volunteer|event|room|book/);
  if (isSimple) return { title:'Thinking…', steps:[] };

  // Greetings / small talk
  if (t.match(/^(hi|hello|hey|good morning|good afternoon|thanks|thank you|ok|okay|yes|no|sure|great|sounds good)/)) {
    return { title:'Thinking…', steps:[] };
  }

  // Finance
  if (wsId === 'finance' || t.match(/giving|donor|donation|recurr|lapsed|revenue|budget|securegive|financ|money|tithe|offering/)) {
    if (t.match(/report|summary|board|export|overview/))
      return { title:'Pulling your SecureGive data', steps:['Retrieved giving transactions','Analyzed recurring donor trends','Generated board summary'] };
    if (t.match(/lapsed|missed|inactive/))
      return { title:'Checking donor activity', steps:['Scanned recurring donor records','Identified lapsed donors'] };
    if (t.match(/forecast|predict|project/))
      return { title:'Building giving forecast', steps:['Analyzed 12-month giving trend','Projected based on recurring MRR'] };
    return { title:'Checking SecureGive data', steps:['Retrieved giving data'] };
  }

  // Guests
  if (wsId === 'guests' || t.match(/guest|visitor|follow.?up|connection card|first.?time|new people/)) {
    if (t.match(/plan|follow|email|reach out/))
      return { title:'Building follow-up plan', steps:['Pulled guest records from Rock RMS','Drafted personalized follow-up sequence','Matched guests to connection opportunities'] };
    return { title:'Checking guest records', steps:['Pulled guest data from Rock RMS'] };
  }

  // Volunteers
  if (wsId === 'volunteers' || t.match(/volunteer|schedule|gap|role|kids ministry|greeter|production|fill|assign/)) {
    if (t.match(/schedule|month|build|create/))
      return { title:'Building volunteer schedule', steps:['Reviewed availability for active volunteers','Matched skills to roles across Sundays','Identified gaps and suggested fills'] };
    if (t.match(/gap|open|unfilled|missing/))
      return { title:'Checking for gaps', steps:['Scanned this Sunday\'s schedule','Identified open roles','Found suggested fills'] };
    return { title:'Checking volunteer data', steps:['Loaded schedule from Rock RMS'] };
  }

  // Events
  if (wsId === 'events' || t.match(/easter|christmas|event|service|calendar|holiday|sunday|plan|schedule|room|conflict/)) {
    if (t.match(/plan|easter|christmas|special/))
      return { title:'Planning your event', steps:['Reviewed attendance history','Checked calendar for conflicts','Estimated volunteer and room needs'] };
    if (t.match(/holiday|upcoming|next|calendar/))
      return { title:'Checking your calendar', steps:['Pulled upcoming events from Google Calendar'] };
    return { title:'Checking calendar', steps:['Reviewed your calendar data'] };
  }

  // Leadership / briefing
  if (wsId === 'leadership' || t.match(/brief|health|overview|board|report|trend|risk|summary|pastor|lead/)) {
    if (t.match(/brief|overview|summary|health/))
      return { title:'Compiling your briefing', steps:['Pulled attendance and giving trends','Reviewed open items across all workspaces','Identified items that need your attention'] };
    return { title:'Analyzing church data', steps:['Reviewed cross-workspace data','Identified key insights'] };
  }

  // Communications
  if (wsId === 'comms' || t.match(/email|announcement|draft|send|message|communicate|text|audience/)) {
    if (t.match(/draft|write|create|announcement/))
      return { title:'Drafting your message', steps:['Pulled details from your workspaces','Drafted message with recommended timing'] };
    return { title:'Preparing communication', steps:['Checked recipient list from Rock RMS'] };
  }

  // Youth
  if (wsId === 'youth' || t.match(/camp|student|youth|parent|permission|chaperone/)) {
    if (t.match(/camp|plan|prep/))
      return { title:'Building camp prep plan', steps:['Loaded student roster from Rock RMS','Reviewed camp registration status','Built follow-up task list'] };
    return { title:'Checking student data', steps:['Loaded youth data from Rock RMS'] };
  }

  // Facilities
  if (wsId === 'facilities' || t.match(/room|book|maintenance|facility|conflict|setup|sanctuary|chapel/)) {
    if (t.match(/conflict|book|reserv|easter|weekend/))
      return { title:'Reviewing facilities calendar', steps:['Checked all room bookings','Identified conflicts','Found available alternatives'] };
    return { title:'Checking room availability', steps:['Reviewed facilities calendar'] };
  }

  // Default — generic but still relevant
  return { title:'Analyzing your church data', steps:['Reviewing relevant data','Preparing your response'] };
}

function addLoadingCard(wsId, id, steps, title) {
  const conv = document.getElementById('conv-' + wsId);
  const div = document.createElement('div');
  div.id = id;
  div.className = 'loading-card';
  const hasSteps = steps && steps.length > 0;
  div.innerHTML = `<div class="loading-title">${title || 'Thinking…'}</div>
    <div id="${id}-steps"></div>
    ${hasSteps ? `<div class="step-pending" id="${id}-pending">
      <div class="step-spinner"></div>
      <span class="step-label">Working on it…</span>
    </div>` : `<div class="step-pending" id="${id}-pending">
      <div class="step-spinner"></div>
    </div>`}`;
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
}

async function animateLoadingSteps(id, steps) {
  for (const step of steps) {
    await delay(500 + Math.random() * 400);
    const el = document.getElementById(id + '-steps');
    if (el) {
      const s = document.createElement('div');
      s.className = 'loading-step';
      s.innerHTML = `<div class="step-icon"><svg width="8" height="8" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="#4CAF7A" stroke-width="1.5" stroke-linecap="round"/></svg></div><span class="step-label">${step}</span>`;
      el.appendChild(s);
    }
    const conv = document.getElementById('conv-' + state.active);
    if (conv) conv.scrollTop = conv.scrollHeight;
  }
  const pending = document.getElementById(id + '-pending');
  if (pending) pending.style.display = 'none';
}

function removeLoading(wsId, id) { const el = document.getElementById(id); if(el) el.remove(); }

function updatePanel(wsId, panel, ws) {
  const header = document.getElementById('panel-header-' + wsId);
  if (header) header.innerHTML = `
    <div class="state-indicator"><svg width="7" height="7" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3.5" fill="#4CAF7A"/></svg>${panel.stateLabel || 'Ready'}</div>
    <div class="panel-title">${panel.title || ws.panelTitle}</div>
    <div class="panel-sub">${panel.sub || ''}</div>`;
  if (panel.actions?.length) {
    const act = document.getElementById('panel-actions-' + wsId);
    if (act) act.innerHTML = `<div class="act-label">Next step</div>
      <button class="btn-primary" style="background:${ws.btnColor}" onclick="sendMsg('${wsId}',${JSON.stringify(panel.actions[0])})">${panel.actions[0]}</button>
      ${panel.actions.length>1?`<div class="btn-row">${panel.actions.slice(1,3).map(a=>`<button class="btn-sec" onclick="sendMsg('${wsId}',${JSON.stringify(a)})">${a}</button>`).join('')}</div>`:''}
      ${panel.actions.length>3?`<div class="btn-row">${panel.actions.slice(3,5).map(a=>`<button class="btn-sec" onclick="sendMsg('${wsId}',${JSON.stringify(a)})">${a}</button>`).join('')}</div>`:''}`;
  }
}

async function callAI(wsId, userMessage, contextData) {
  if (!conversationHistory[wsId]) conversationHistory[wsId] = [];
  conversationHistory[wsId].push({ role:'user', content:userMessage });
  const ws = WS[wsId];
  const today = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const system = `You are the ${ws.title} for ChurchOS, an AI-powered church operations platform.
Today is ${today}. Be warm, concise, and pastoral. Use **bold** for the single most important number or name.
Keep responses to 2–3 sentences for simple questions. For reports/plans, be more detailed.
When you produce a structured result, end with a JSON block in <panel> tags:
<panel>{"stateLabel":"Ready to approve","title":"Panel title","sub":"Subtitle","actions":["Primary action","Secondary 1","Secondary 2"]}</panel>
Current live data: ${JSON.stringify(contextData, null, 2)}`;

  const res = await fetch('/api/ai/workspace-chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:600, system, messages: conversationHistory[wsId] }),
  });
  if (!res.ok) throw new Error('API ' + res.status);
  const data = await res.json();
  conversationHistory[wsId].push({ role:'assistant', content: data.text || '' });
  return data;
}

function setText(id, val) { const el = document.getElementById(id); if(el) el.textContent = val; }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── EVENT DELEGATION — reliable clicks for all dynamic buttons ─────────────
document.addEventListener('click', function(e) {
  const chip = e.target.closest('.chip');
  if (chip) { sendMsg(state.active, chip.textContent.trim()); return; }
  const sec = e.target.closest('.panel-actions .btn-sec');
  if (sec) { sendMsg(state.active, sec.textContent.trim()); return; }
  const pri = e.target.closest('.panel-actions .btn-primary');
  if (pri) { sendMsg(state.active, pri.textContent.trim()); return; }
});

buildWorkspaces();

show('home');
